<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>UniNest Kabale</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <h2>🏠 UniNest Kabale</h2>
    </nav>

    <!-- HERO SECTION -->
    <section class="hero">
        <h1>Find the Best Hostels in Kabale</h1>
        <p>Near UCU Bishop Barham College</p>

        <div class="search-box">
            <input type="text" id="search" placeholder="Search hostels...">
            <select id="filter">
                <option value="all">All Hostels</option>
                <option value="available">Available Only</option>
            </select>
        </div>
    </section>

    <!-- HOSTELS -->
    <section class="container">
        <h2>Explore Hostels</h2>
        <div id="list" class="grid"></div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 UniNest Kabale | Student Housing Finder</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
